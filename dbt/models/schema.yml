version: 2

models:
  - name: stg_bookings
    columns:
      - name: booking_id
        data_tests: [not_null, unique]
      - name: booking_status
        data_tests:
          - accepted_values:
              values: ["CONFIRMED", "CANCELLED", "PENDING"]
      - name: payment_status
        data_tests:
          - accepted_values:
              values: ["PAID", "FAILED", "REFUNDED"]
  - name: stg_payments
    columns:
      - name: payment_id
        data_tests: [not_null, unique]
      - name: booking_id
        data_tests: [not_null]
  - name: dim_airport
    columns:
      - name: airport_code
        data_tests: [not_null, unique]
  - name: fact_booking
    columns:
      - name: booking_id
        data_tests: [not_null, unique]
      - name: ticket_price
        data_tests: [not_null]
  - name: fact_payment
    columns:
      - name: payment_id
        data_tests: [not_null, unique]
      - name: booking_id
        data_tests:
          - relationships:
              to: ref('fact_booking')
              field: booking_id
