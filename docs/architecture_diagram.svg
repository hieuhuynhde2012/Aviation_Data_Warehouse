<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Dockerized Aviation Data Warehouse Architecture With Kafka And Spark</title>
  <desc id="desc">Architecture diagram showing data sources, Airflow orchestration, MinIO raw storage, Kafka streaming, Spark feature processing, PostgreSQL warehouse, dbt transformations, Superset dashboards, and metadata tracking.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 34px Arial, sans-serif; fill: #102033; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #526173; }
      .group-title { font: 700 15px Arial, sans-serif; fill: #263244; }
      .box-title { font: 700 16px Arial, sans-serif; fill: #102033; }
      .box-text { font: 400 13px Arial, sans-serif; fill: #475569; }
      .small { font: 400 12px Arial, sans-serif; fill: #64748b; }
      .pill { font: 700 12px Arial, sans-serif; fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #d8e1ee; stroke-width: 1.5; }
      .source { fill: #ffffff; stroke: #2f80ed; stroke-width: 2; }
      .airflow { fill: #ffffff; stroke: #f97316; stroke-width: 2; }
      .minio { fill: #ffffff; stroke: #0f9f6e; stroke-width: 2; }
      .kafka { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .spark { fill: #ffffff; stroke: #e11d48; stroke-width: 2; }
      .postgres { fill: #ffffff; stroke: #7c3aed; stroke-width: 2; }
      .dbt { fill: #ffffff; stroke: #db2777; stroke-width: 2; }
      .superset { fill: #ffffff; stroke: #0891b2; stroke-width: 2; }
      .metadata { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <text x="64" y="58" class="title">Dockerized Aviation Data Warehouse Pipeline</text>
  <text x="64" y="88" class="subtitle">Batch warehouse + Kafka streaming sidecar + Spark feature processing + dbt marts + Superset dashboards</text>

  <rect x="48" y="120" width="1504" height="770" rx="18" class="panel"/>

  <text x="82" y="158" class="group-title">1. Sources</text>
  <text x="342" y="158" class="group-title">2. Orchestration</text>
  <text x="574" y="158" class="group-title">3. Storage / Stream</text>
  <text x="820" y="158" class="group-title">4. Spark Processing</text>
  <text x="1056" y="158" class="group-title">5. Warehouse + dbt</text>
  <text x="1376" y="158" class="group-title">6. BI / Evidence</text>

  <rect x="78" y="192" width="218" height="104" rx="10" class="source" filter="url(#shadow)"/>
  <text x="102" y="226" class="box-title">BTS On-Time CSV</text>
  <text x="102" y="252" class="box-text">Flight delay, route,</text>
  <text x="102" y="272" class="box-text">cancellation signals</text>

  <rect x="78" y="324" width="218" height="104" rx="10" class="source" filter="url(#shadow)"/>
  <text x="102" y="358" class="box-title">OurAirports CSV</text>
  <text x="102" y="384" class="box-text">Airport, country,</text>
  <text x="102" y="404" class="box-text">region reference data</text>

  <rect x="78" y="456" width="218" height="118" rx="10" class="source" filter="url(#shadow)"/>
  <text x="102" y="490" class="box-title">Synthetic Business Data</text>
  <text x="102" y="516" class="box-text">Bookings, payments,</text>
  <text x="102" y="536" class="box-text">dirty CDC-like events</text>
  <text x="102" y="556" class="small">Generated from real routes</text>

  <rect x="78" y="604" width="218" height="94" rx="10" class="source" filter="url(#shadow)"/>
  <text x="102" y="638" class="box-title">CSV Files</text>
  <text x="102" y="664" class="box-text">data/input + generated</text>
  <text x="102" y="684" class="small">Used by Spark jobs</text>

  <rect x="338" y="282" width="190" height="178" rx="12" class="airflow" filter="url(#shadow)"/>
  <text x="366" y="318" class="box-title">Apache Airflow</text>
  <text x="366" y="346" class="box-text">Batch DAG</text>
  <text x="366" y="368" class="box-text">Streaming DAG</text>
  <text x="366" y="390" class="box-text">Retries + metadata</text>
  <text x="366" y="412" class="box-text">dbt run/test trigger</text>
  <rect x="366" y="430" width="90" height="24" rx="12" fill="#f97316"/>
  <text x="382" y="447" class="pill">SCHEDULE</text>

  <rect x="580" y="198" width="184" height="96" rx="10" class="minio" filter="url(#shadow)"/>
  <text x="606" y="232" class="box-title">MinIO Raw Lake</text>
  <text x="606" y="258" class="box-text">aviation-raw</text>
  <text x="606" y="276" class="small">Partitioned objects</text>

  <rect x="580" y="326" width="184" height="96" rx="10" class="minio" filter="url(#shadow)"/>
  <text x="606" y="360" class="box-title">Quality Reports</text>
  <text x="606" y="386" class="box-text">DQ files + profile</text>
  <text x="606" y="404" class="small">Record-level errors</text>

  <rect x="580" y="474" width="184" height="116" rx="10" class="kafka" filter="url(#shadow)"/>
  <text x="606" y="508" class="box-title">Kafka</text>
  <text x="606" y="534" class="box-text">booking_events</text>
  <text x="606" y="554" class="box-text">payment_events</text>
  <rect x="606" y="566" width="70" height="22" rx="11" fill="#111827"/>
  <text x="622" y="582" class="pill">EVENTS</text>

  <rect x="812" y="214" width="210" height="118" rx="12" class="spark" filter="url(#shadow)"/>
  <text x="842" y="250" class="box-title">Spark Standalone</text>
  <text x="842" y="278" class="box-text">Large CSV processing</text>
  <text x="842" y="300" class="box-text">Route/airline features</text>
  <rect x="842" y="312" width="80" height="22" rx="11" fill="#e11d48"/>
  <text x="861" y="328" class="pill">SPARK</text>

  <rect x="812" y="362" width="210" height="128" rx="12" class="spark" filter="url(#shadow)"/>
  <text x="842" y="398" class="box-title">PySpark Job</text>
  <text x="842" y="426" class="box-text">aviation_feature_job.py</text>
  <text x="842" y="448" class="box-text">Delay + booking features</text>
  <text x="842" y="470" class="small">Writes audit metadata</text>

  <rect x="1056" y="190" width="194" height="70" rx="10" class="postgres" filter="url(#shadow)"/>
  <text x="1084" y="222" class="box-title">raw schema</text>
  <text x="1084" y="244" class="small">Batch + stream raw tables</text>

  <rect x="1056" y="286" width="194" height="70" rx="10" class="postgres" filter="url(#shadow)"/>
  <text x="1084" y="318" class="box-title">staging schema</text>
  <text x="1084" y="340" class="small">Standardized values</text>

  <rect x="1056" y="382" width="194" height="70" rx="10" class="postgres" filter="url(#shadow)"/>
  <text x="1084" y="414" class="box-title">intermediate</text>
  <text x="1084" y="436" class="small">Reusable business logic</text>

  <rect x="1056" y="478" width="194" height="88" rx="10" class="postgres" filter="url(#shadow)"/>
  <text x="1084" y="510" class="box-title">mart schema</text>
  <text x="1084" y="532" class="small">Facts, dashboards,</text>
  <text x="1084" y="550" class="small">Spark feature tables</text>

  <rect x="1276" y="294" width="160" height="150" rx="12" class="dbt" filter="url(#shadow)"/>
  <text x="1306" y="330" class="box-title">dbt Core</text>
  <text x="1306" y="358" class="box-text">Staging</text>
  <text x="1306" y="380" class="box-text">Dims + facts</text>
  <text x="1306" y="402" class="box-text">Marts + tests</text>
  <rect x="1306" y="416" width="56" height="22" rx="11" fill="#db2777"/>
  <text x="1320" y="432" class="pill">SQL</text>

  <rect x="1404" y="206" width="112" height="226" rx="12" class="superset" filter="url(#shadow)"/>
  <text x="1426" y="240" class="box-title">Superset</text>
  <text x="1426" y="270" class="box-text">Executive</text>
  <text x="1426" y="292" class="box-text">dashboards</text>
  <text x="1426" y="328" class="box-text">DQ / ops</text>
  <text x="1426" y="350" class="box-text">evidence</text>
  <rect x="1426" y="390" width="58" height="22" rx="11" fill="#0891b2"/>
  <text x="1439" y="406" class="pill">BI</text>

  <rect x="338" y="732" width="912" height="104" rx="12" class="metadata" filter="url(#shadow)"/>
  <text x="370" y="768" class="box-title">Metadata, Quality, Quarantine, And Audit Tables</text>
  <text x="370" y="796" class="box-text">metadata.raw_load_audit | metadata.dq_record_errors | metadata.reconciliation_summary | quarantine.invalid_records</text>
  <text x="370" y="818" class="box-text">metadata.streaming_dlq | metadata.streaming_reconciliation | metadata.spark_job_audit</text>

