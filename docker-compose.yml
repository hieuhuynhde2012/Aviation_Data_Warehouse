name: aviation-data-warehouse

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  image: aviation-airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES:-False}
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    WAREHOUSE_HOST: ${WAREHOUSE_HOST:-postgres-warehouse}
    WAREHOUSE_DB: ${WAREHOUSE_DB:-aviation_dw}
    WAREHOUSE_USER: ${WAREHOUSE_USER:-aviation}
    WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:-aviation}
    MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-aviation-raw}
    MINIO_BUCKET_ARCHIVE: ${MINIO_BUCKET_ARCHIVE:-aviation-archive}
    MINIO_BUCKET_QUALITY: ${MINIO_BUCKET_QUALITY:-aviation-quality-reports}
    BTS_YEAR: ${BTS_YEAR:-2026}
    BTS_MONTH: ${BTS_MONTH:-4}
    BTS_URL_TEMPLATE: ${BTS_URL_TEMPLATE}
    OURAIRPORTS_AIRPORTS_URL: ${OURAIRPORTS_AIRPORTS_URL}
    OURAIRPORTS_COUNTRIES_URL: ${OURAIRPORTS_COUNTRIES_URL}
    OURAIRPORTS_REGIONS_URL: ${OURAIRPORTS_REGIONS_URL}
    SYNTHETIC_SEED: ${SYNTHETIC_SEED:-42}
    BOOKINGS_PER_FLIGHT_MIN: ${BOOKINGS_PER_FLIGHT_MIN:-30}
    BOOKINGS_PER_FLIGHT_MAX: ${BOOKINGS_PER_FLIGHT_MAX:-180}
    MAX_FLIGHTS_FOR_SYNTHETIC: ${MAX_FLIGHTS_FOR_SYNTHETIC:-2000}
    SYNTHETIC_TARGET_ROWS: ${SYNTHETIC_TARGET_ROWS:-100000}
    CURRENCY: ${CURRENCY:-USD}
    DIRTY_DATA_RATE: ${DIRTY_DATA_RATE:-0.08}
    DUPLICATE_EVENT_RATE: ${DUPLICATE_EVENT_RATE:-0.03}
    MISSING_OPTIONAL_RATE: ${MISSING_OPTIONAL_RATE:-0.02}
    PAYMENT_MISMATCH_RATE: ${PAYMENT_MISMATCH_RATE:-0.015}
    CRITICAL_INVALID_RATE: ${CRITICAL_INVALID_RATE:-0.003}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
    - ./ingestion:/opt/airflow/ingestion
    - ./dbt:/opt/airflow/dbt
    - ./requirements.txt:/opt/airflow/requirements.txt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres-airflow:
      condition: service_healthy
    postgres-warehouse:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - postgres-airflow-db:/var/lib/postgresql/data

  postgres-warehouse:
    image: postgres:16
    environment:
      POSTGRES_USER: ${WAREHOUSE_USER:-aviation}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD:-aviation}
      POSTGRES_DB: ${WAREHOUSE_DB:-aviation_dw}
    ports:
      - "${WAREHOUSE_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_USER:-aviation} -d ${WAREHOUSE_DB:-aviation_dw}"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - postgres-warehouse-db:/var/lib/postgresql/data
      - ./warehouse:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-07-15T17-46-06Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/${MINIO_BUCKET_RAW:-aviation-raw};
      mc mb -p local/${MINIO_BUCKET_ARCHIVE:-aviation-archive};
      mc mb -p local/${MINIO_BUCKET_QUALITY:-aviation-quality-reports};
      exit 0;
      "

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER:-admin} \
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Data \
          --lastname Engineer \
          --role Admin \
          --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_WEB_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    working_dir: /usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app
      WAREHOUSE_HOST: ${WAREHOUSE_HOST:-postgres-warehouse}
      WAREHOUSE_DB: ${WAREHOUSE_DB:-aviation_dw}
      WAREHOUSE_USER: ${WAREHOUSE_USER:-aviation}
      WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:-aviation}
    volumes:
      - ./dbt:/usr/app
    depends_on:
      postgres-warehouse:
        condition: service_healthy
    entrypoint: ["tail", "-f", "/dev/null"]

  superset:
    image: apache/superset:4.0.2
    environment:
      SUPERSET_SECRET_KEY: local-dev-secret-change-me
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://superset:superset@postgres-superset:5432/superset
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    depends_on:
      postgres-superset:
        condition: service_healthy
      postgres-warehouse:
        condition: service_healthy
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@example.com --password admin || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "
    volumes:
      - superset-home:/app/superset_home

  postgres-superset:
    image: postgres:16
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - postgres-superset-db:/var/lib/postgresql/data

volumes:
  postgres-airflow-db:
  postgres-warehouse-db:
  postgres-superset-db:
  minio-data:
  superset-home:
