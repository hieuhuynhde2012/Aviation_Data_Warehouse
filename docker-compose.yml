name: aviation-data-warehouse

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  image: aviation-airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES:-False}
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__WORKERS: ${AIRFLOW_WEBSERVER_WORKERS:-1}
    AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: ${AIRFLOW_WEBSERVER_MASTER_TIMEOUT:-300}
    AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: ${AIRFLOW_WEBSERVER_WORKER_TIMEOUT:-300}
    PYTHONPATH: /opt/airflow
    WAREHOUSE_HOST: ${WAREHOUSE_HOST:-postgres-warehouse}
    WAREHOUSE_DB: ${WAREHOUSE_DB:-aviation_dw}
    WAREHOUSE_USER: ${WAREHOUSE_USER:-aviation}
    WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:-aviation}
    MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-aviation-raw}
    MINIO_BUCKET_ARCHIVE: ${MINIO_BUCKET_ARCHIVE:-aviation-archive}
    MINIO_BUCKET_QUALITY: ${MINIO_BUCKET_QUALITY:-aviation-quality-reports}
    BTS_YEAR: ${BTS_YEAR:-2026}
    BTS_MONTH: ${BTS_MONTH:-4}
    BTS_URL_TEMPLATE: ${BTS_URL_TEMPLATE}
    OURAIRPORTS_AIRPORTS_URL: ${OURAIRPORTS_AIRPORTS_URL}
    OURAIRPORTS_COUNTRIES_URL: ${OURAIRPORTS_COUNTRIES_URL}
    OURAIRPORTS_REGIONS_URL: ${OURAIRPORTS_REGIONS_URL}
    SYNTHETIC_SEED: ${SYNTHETIC_SEED:-42}
    BOOKINGS_PER_FLIGHT_MIN: ${BOOKINGS_PER_FLIGHT_MIN:-30}
    BOOKINGS_PER_FLIGHT_MAX: ${BOOKINGS_PER_FLIGHT_MAX:-180}
    MAX_FLIGHTS_FOR_SYNTHETIC: ${MAX_FLIGHTS_FOR_SYNTHETIC:-2000}
    SYNTHETIC_TARGET_ROWS: ${SYNTHETIC_TARGET_ROWS:-100000}
    CURRENCY: ${CURRENCY:-USD}
    DIRTY_DATA_RATE: ${DIRTY_DATA_RATE:-0.08}
    DUPLICATE_EVENT_RATE: ${DUPLICATE_EVENT_RATE:-0.03}
    MISSING_OPTIONAL_RATE: ${MISSING_OPTIONAL_RATE:-0.02}
    PAYMENT_MISMATCH_RATE: ${PAYMENT_MISMATCH_RATE:-0.015}
    CRITICAL_INVALID_RATE: ${CRITICAL_INVALID_RATE:-0.003}
    KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    KAFKA_BOOKING_TOPIC: ${KAFKA_BOOKING_TOPIC:-booking_events}
    KAFKA_PAYMENT_TOPIC: ${KAFKA_PAYMENT_TOPIC:-payment_events}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
    - ./ingestion:/opt/airflow/ingestion
    - ./streaming:/opt/airflow/streaming
    - ./dbt:/opt/airflow/dbt
    - ./requirements.txt:/opt/airflow/requirements.txt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres-airflow:
      condition: service_healthy
    postgres-warehouse:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - postgres-airflow-db:/var/lib/postgresql/data

  postgres-warehouse:
    image: postgres:16
    environment:
      POSTGRES_USER: ${WAREHOUSE_USER:-aviation}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD:-aviation}
      POSTGRES_DB: ${WAREHOUSE_DB:-aviation_dw}
    ports:
      - "${WAREHOUSE_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_USER:-aviation} -d ${WAREHOUSE_DB:-aviation_dw}"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - postgres-warehouse-db:/var/lib/postgresql/data
      - ./warehouse:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-07-15T17-46-06Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/${MINIO_BUCKET_RAW:-aviation-raw};
      mc mb -p local/${MINIO_BUCKET_ARCHIVE:-aviation-archive};
      mc mb -p local/${MINIO_BUCKET_QUALITY:-aviation-quality-reports};
      exit 0;
      "

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep Zookeeper"]
      interval: 10s
      retries: 10
      start_period: 10s
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      retries: 10
      start_period: 20s
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    environment:
      KAFKA_CLUSTERS_0_NAME: aviation-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-8089}:8080"
    depends_on:
      kafka:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER:-admin} \
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Data \
          --lastname Engineer \
          --role Admin \
          --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_WEB_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    working_dir: /usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app
      WAREHOUSE_HOST: ${WAREHOUSE_HOST:-postgres-warehouse}
      WAREHOUSE_DB: ${WAREHOUSE_DB:-aviation_dw}
      WAREHOUSE_USER: ${WAREHOUSE_USER:-aviation}
      WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:-aviation}
    volumes:
      - ./dbt:/usr/app
    depends_on:
      postgres-warehouse:
        condition: service_healthy
    entrypoint: ["tail", "-f", "/dev/null"]

  spark-master:
    image: apache/spark:3.5.1
    user: root
    entrypoint: ["/opt/spark/bin/spark-class"]
    command:
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "${SPARK_MASTER_UI_PORT:-8081}:8080"
      - "${SPARK_MASTER_PORT:-7077}:7077"
    volumes:
      - ./spark/jobs:/opt/spark/work-dir/jobs
      - ./data:/opt/spark/work-dir/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080', timeout=3).read(1)\""]
      interval: 10s
      retries: 10
      start_period: 20s

  spark-worker:
    image: apache/spark:3.5.1
    user: root
    entrypoint: ["/opt/spark/bin/spark-class"]
    command:
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 2g
    ports:
      - "${SPARK_WORKER_UI_PORT:-8082}:8081"
    volumes:
      - ./spark/jobs:/opt/spark/work-dir/jobs
      - ./data:/opt/spark/work-dir/data
    depends_on:
      spark-master:
        condition: service_healthy

  spark-submit:
    image: apache/spark:3.5.1
    user: root
    entrypoint: ["/bin/bash", "-lc"]
    command: ["tail -f /dev/null"]
    environment:
      SPARK_MASTER_URL: ${SPARK_MASTER_URL:-spark://spark-master:7077}
      WAREHOUSE_HOST: ${WAREHOUSE_HOST:-postgres-warehouse}
      WAREHOUSE_DB: ${WAREHOUSE_DB:-aviation_dw}
      WAREHOUSE_USER: ${WAREHOUSE_USER:-aviation}
      WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:-aviation}
      BTS_YEAR: ${BTS_YEAR:-2026}
      BTS_MONTH: ${BTS_MONTH:-4}
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-1g}
      SPARK_EXECUTOR_MEMORY: ${SPARK_EXECUTOR_MEMORY:-1g}
    volumes:
      - ./spark/jobs:/opt/spark/work-dir/jobs
      - ./data:/opt/spark/work-dir/data
    depends_on:
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_started
      postgres-warehouse:
        condition: service_healthy

  superset:
    image: apache/superset:4.0.2
    environment:
      SUPERSET_SECRET_KEY: local-dev-secret-change-me
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://superset:superset@postgres-superset:5432/superset
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    depends_on:
      postgres-superset:
        condition: service_healthy
      postgres-warehouse:
        condition: service_healthy
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@example.com --password admin || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "
    volumes:
      - superset-home:/app/superset_home

  postgres-superset:
    image: postgres:16
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - postgres-superset-db:/var/lib/postgresql/data

volumes:
  postgres-airflow-db:
  postgres-warehouse-db:
  postgres-superset-db:
  minio-data:
  superset-home:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
